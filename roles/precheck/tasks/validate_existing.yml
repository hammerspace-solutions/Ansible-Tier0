---
# Existing Configuration Checks
# Detects pre-existing mdadm and NFS configurations

- name: Check for existing RAID arrays
  ansible.builtin.command: mdadm --detail --scan
  register: mdadm_scan
  changed_when: false
  failed_when: false
  when: not _precheck_hw_raid

- name: Display existing RAID configuration
  ansible.builtin.debug:
    msg: |
      Existing RAID arrays detected:
      {{ mdadm_scan.stdout }}
  when:
    - not _precheck_hw_raid
    - mdadm_scan.rc == 0
    - mdadm_scan.stdout | default('') | length > 0

- name: Check current NFS exports
  ansible.builtin.command: exportfs -v
  register: current_exports
  changed_when: false
  failed_when: false

- name: Display current NFS exports
  ansible.builtin.debug:
    msg: |
      Current NFS exports:
      {{ current_exports.stdout | default('None configured') }}
  when: current_exports.rc == 0
