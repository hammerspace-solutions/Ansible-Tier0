---
# Build the pd-di container image on the target host, run it, register the
# node from inside. Assumes container_runtime role has already installed the
# chosen runtime.

- name: Ensure build directory
  ansible.builtin.file:
    path: "{{ di_container_build_dir }}"
    state: directory
    mode: "0755"

- name: Ensure payload directory
  ansible.builtin.file:
    path: "{{ di_container_build_dir }}/payload"
    state: directory
    mode: "0755"

- name: Copy Containerfile into build dir
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/container/Containerfile"
    dest: "{{ di_container_build_dir }}/Containerfile"
    mode: "0644"

# ---------------------------------------------------------------------------
# Stage payload: DI tarball RPMs + add_node.py
# ---------------------------------------------------------------------------

- name: Download DI tarball from URL
  ansible.builtin.get_url:
    url: "{{ di_tarball_url }}"
    dest: "{{ di_container_build_dir }}/di-components.tar.gz"
    mode: "0644"
  when: di_rpm_source == "url"

- name: Copy DI tarball from local path
  ansible.builtin.copy:
    src: "{{ di_tarball_local_path }}"
    dest: "{{ di_container_build_dir }}/di-components.tar.gz"
    mode: "0644"
  when: di_rpm_source == "local"

- name: Extract tarball into payload/
  ansible.builtin.unarchive:
    src: "{{ di_container_build_dir }}/di-components.tar.gz"
    dest: "{{ di_container_build_dir }}/payload"
    remote_src: true
  when: di_rpm_source in ['url', 'local']

- name: Flatten payload layout
  # Tarballs commonly contain a nested folder; move RPMs and add_node.py up.
  ansible.builtin.shell:
    cmd: |
      set -eu
      cd "{{ di_container_build_dir }}/payload"
      find . -mindepth 2 \( -name '*.rpm' -o -name 'add_node.py' \) \
          -exec mv -f -t . {} +
      find . -mindepth 1 -type d -empty -delete
    executable: /bin/bash
  changed_when: false
  when: di_rpm_source in ['url', 'local']

# When di_rpm_source == "directory", copy loose RPMs and add_node.py from the
# controller's payload dir straight into the remote build context.
- name: Set target architecture for package filtering
  ansible.builtin.set_fact:
    _di_arch: "{{ ansible_architecture }}"

- name: Enumerate local payload files (directory mode, architecture-filtered)
  ansible.builtin.find:
    paths: "{{ di_payload_local_dir }}"
    patterns:
      - "*.{{ _di_arch }}.rpm"
      - "*.noarch.rpm"
      - "add_node.py"
  register: _local_payload
  delegate_to: localhost
  become: false
  when: di_rpm_source == "directory"

- name: Fail if local payload directory is empty
  ansible.builtin.fail:
    msg: >-
      di_rpm_source=directory but no *.rpm / add_node.py found under
      {{ di_payload_local_dir }} on the Ansible controller.
  when:
    - di_rpm_source == "directory"
    - (_local_payload.matched | default(0)) == 0

- name: Copy payload files to build dir (directory mode)
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ di_container_build_dir }}/payload/{{ item.path | basename }}"
    mode: "0644"
  loop: "{{ _local_payload.files | default([]) }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: di_rpm_source == "directory"

- name: Check whether add_node.py is already in payload
  ansible.builtin.stat:
    path: "{{ di_container_build_dir }}/payload/add_node.py"
  register: _addnode_stat

- name: Download add_node.py fallback (if not in tarball)
  ansible.builtin.get_url:
    url: "{{ di_add_node_script_url }}"
    dest: "{{ di_container_build_dir }}/payload/add_node.py"
    mode: "0755"
  when:
    - not _addnode_stat.stat.exists
    - di_add_node_script_url | default('') | length > 0

- name: Confirm payload contains pd-di RPM for target architecture
  ansible.builtin.find:
    paths: "{{ di_container_build_dir }}/payload"
    patterns: "pd-di-*.{{ _di_arch }}.rpm"
  register: _pddi_rpms

- name: Fall back to any pd-di RPM (arch-agnostic)
  ansible.builtin.find:
    paths: "{{ di_container_build_dir }}/payload"
    patterns: "pd-di-*.rpm"
  register: _pddi_rpms
  when: _pddi_rpms.matched == 0

- name: Fail if no pd-di RPM in payload
  ansible.builtin.fail:
    msg: >-
      No pd-di-*.rpm found in {{ di_container_build_dir }}/payload.
      Check di_tarball_url / di_tarball_local_path.
  when: _pddi_rpms.matched == 0

# ---------------------------------------------------------------------------
# Build image
# ---------------------------------------------------------------------------

- name: "Build container image with {{ di_container_runtime }}"
  ansible.builtin.command:
    cmd: >-
      {{ di_container_runtime }} build
      --build-arg BASE_IMAGE={{ di_container_base_image }}
      -t {{ di_container_image }}
      -f {{ di_container_build_dir }}/Containerfile
      {{ di_container_build_dir }}
  register: build_result
  changed_when: true

# ---------------------------------------------------------------------------
# Run container
# ---------------------------------------------------------------------------

- name: Stop any existing pd-di container
  ansible.builtin.command:
    cmd: "{{ di_container_runtime }} rm -f {{ di_container_name }}"
  register: rm_result
  changed_when: rm_result.rc == 0
  failed_when: false

- name: "Start {{ di_container_name }} container"
  ansible.builtin.command:
    cmd: >-
      {{ di_container_runtime }} run -d
      --name {{ di_container_name }}
      {{ di_container_systemd_flag }}
      {{ '--privileged' if di_container_privileged | bool else '' }}
      {{ '--network host' if di_container_host_network | bool else '' }}
      --restart {{ di_container_restart_policy }}
      --cap-add SYS_ADMIN --cap-add NET_ADMIN --cap-add SYS_PTRACE
      --tmpfs /run --tmpfs /tmp
      -v /sys/fs/cgroup:/sys/fs/cgroup:rw
      -v /lib/modules:/lib/modules:ro
      --add-host {{ hammerspace_cluster_hostname }}:{{ hammerspace_cluster_mgmt_ip }}
      {{ di_container_image }}
  register: run_result
  changed_when: true

# ---------------------------------------------------------------------------
# Wait for pd-di inside container, then register
# ---------------------------------------------------------------------------

- name: Wait for pd-di to be active inside the container
  ansible.builtin.command:
    cmd: "{{ di_container_runtime }} exec {{ di_container_name }} systemctl is-active pd-di"
  register: pddi_active
  retries: 12
  delay: 10
  until: pddi_active.stdout == 'active'
  changed_when: false
  failed_when: false

- name: Warn if pd-di did not become active
  ansible.builtin.debug:
    msg: >-
      pd-di inside {{ di_container_name }} is '{{ pddi_active.stdout | default('unknown') }}'.
      Check '{{ di_container_runtime }} logs {{ di_container_name }}' and
      '{{ di_container_runtime }} exec {{ di_container_name }} journalctl -xeu pd-di'.
  when: pddi_active.stdout | default('') != 'active'

- name: Register DI node with Hammerspace (via add_node.py inside container)
  ansible.builtin.command:
    cmd: >-
      {{ di_container_runtime }} exec {{ di_container_name }}
      python3 /usr/local/bin/add_node.py
      -i {{ di_node_ip | default(ansible_default_ipv4.address) }}
      -l {{ di_node_netmask_prefix }}
      -d
      -u {{ hammerspace_api_user }}
      -p {{ hammerspace_api_password }}
      -n {{ di_node_name | default(inventory_hostname) }}
  register: register_result
  no_log: true
  changed_when: register_result.rc == 0
  failed_when: false
  when: not (node_already_registered | default(false) | bool)

# Surface add_node.py errors without exposing the full command line (which
# contains the API password). stderr/stdout from the script itself is safe.
- name: Show registration failure detail (sanitized)
  ansible.builtin.debug:
    msg: |-
      add_node.py registration failed for {{ di_node_name | default(inventory_hostname) }}:
        stderr: {{ register_result.stderr | default('(none)') }}
        stdout: {{ register_result.stdout | default('(none)') }}
  when:
    - not (node_already_registered | default(false) | bool)
    - register_result.rc | default(0) != 0
    - "'already exists' not in (register_result.stderr | default(''))"

- name: Fail if registration failed
  ansible.builtin.fail:
    msg: >-
      DI node registration failed for {{ di_node_name | default(inventory_hostname) }}
      (rc={{ register_result.rc | default('?') }}). See prior debug for sanitized output.
  when:
    - not (node_already_registered | default(false) | bool)
    - register_result.rc | default(0) != 0
    - "'already exists' not in (register_result.stderr | default(''))"
