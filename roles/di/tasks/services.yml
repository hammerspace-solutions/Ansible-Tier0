---
# Services setup role - Enable and start DI-related services

- name: Enable and start lttng-sessiond
  ansible.builtin.systemd:
    name: lttng-sessiond
    state: started
    enabled: true
    daemon_reload: true
  register: lttng_sessiond_result
  failed_when: false

- name: Display lttng-sessiond status
  ansible.builtin.debug:
    msg: "lttng-sessiond: {{ 'started' if lttng_sessiond_result is not failed else 'failed to start (may not be available)' }}"

- name: Enable and start pd-di-lttng-recorder
  ansible.builtin.systemd:
    name: pd-di-lttng-recorder
    state: started
    enabled: true
  register: lttng_recorder_result
  failed_when: false

- name: Display pd-di-lttng-recorder status
  ansible.builtin.debug:
    msg: "pd-di-lttng-recorder: {{ 'started' if lttng_recorder_result is not failed else 'failed to start (may not be available)' }}"

- name: Wait for lttng runtime socket to be ready
  ansible.builtin.wait_for:
    path: /var/run/lttng/lttng-sessiond.sock
    state: present
    timeout: 30
  register: lttng_socket_wait
  failed_when: false

- name: Enable and start pd-di service (retry for lttng/systemd races)
  ansible.builtin.systemd:
    name: pd-di
    state: started
    enabled: true
    daemon_reload: true
  register: pddi_start
  until: pddi_start is success
  retries: 5
  delay: 10

- name: Verify pd-di service is running
  ansible.builtin.systemd:
    name: pd-di
  register: pddi_service_status

- name: Display pd-di service status
  ansible.builtin.debug:
    msg: "pd-di service: {{ pddi_service_status.status.ActiveState | default('unknown') }}"
