---
# Detect disks the playbook must NOT recreate, split into two lists:
#
#   _protected_disks  (STRICT) — disks hosting the OS, root, /boot, swap, or
#                                any mounted filesystem. Never touched.
#                                Boot-drive incident driver: empty detection
#                                used to silently allow mkfs on the boot NVMe.
#
#   _md_member_disks  (ADOPT)  — disks that are members of an existing md
#                                array. NOT excluded from discovery; raid_setup
#                                detects existing membership and remaps
#                                mount_points to the actual /dev/mdN instead
#                                of recreating the array.
#
#   _lvm_pv_disks     (INFO)   — disks that back LVM PVs. Informational only;
#                                PVs that host mounted FS or swap are already
#                                in _protected_disks via the mount/swap walk.
#
# Hard-fails if _protected_disks is empty (defense-in-depth against the
# 2026-05-14 boot-drive incident).

- name: Detect protected disks (boot / root / mounted FS / swap) — STRICT
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -uo pipefail
      export LC_ALL=C LANG=C

      resolve_to_disk() {
          local src="$1"
          [ -z "$src" ] && return
          [ -b "$src" ] || return
          lsblk -nrpso NAME,TYPE "$src" 2>/dev/null | \
              awk '$2 == "disk" {print $1}' | \
              while read -r disk; do
                  basename "$disk"
              done
      }

      {
          # Mounted filesystems
          awk '/^\/dev\// {print $1}' /proc/mounts | while read -r dev; do
              resolve_to_disk "$dev"
          done

          # Active swap
          awk 'NR>1 && $1 ~ /^\/dev\// {print $1}' /proc/swaps | while read -r dev; do
              resolve_to_disk "$dev"
          done
      } | sort -u | grep -v '^$' || true
  register: _protected_disks_raw
  changed_when: false

- name: Detect md array members (ADOPT — informational, do not exclude)
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -uo pipefail
      export LC_ALL=C LANG=C
      if [ -r /proc/mdstat ]; then
          grep -oE '[a-z]+[0-9]+(n[0-9]+)?(p[0-9]+)?\[[0-9]+\]' /proc/mdstat 2>/dev/null | \
              sed 's/\[[0-9]*\]$//' | sort -u | while read -r member; do
                  # Walk up to physical disk
                  base=$(lsblk -nrpso NAME,TYPE "/dev/${member}" 2>/dev/null | \
                         awk '$2 == "disk" {print $1; exit}')
                  [ -n "$base" ] && basename "$base"
              done | sort -u | grep -v '^$' || true
      fi
  register: _md_members_raw
  changed_when: false

- name: Detect LVM PV disks (INFO — informational, do not exclude)
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -uo pipefail
      export LC_ALL=C LANG=C
      pvs --noheadings -o pv_name 2>/dev/null | while read -r pv; do
          pv=$(echo "$pv" | xargs)
          [ -z "$pv" ] && continue
          [ -b "$pv" ] || continue
          base=$(lsblk -nrpso NAME,TYPE "$pv" 2>/dev/null | \
                 awk '$2 == "disk" {print $1; exit}')
          [ -n "$base" ] && basename "$base"
      done | sort -u | grep -v '^$' || true
  register: _lvm_pvs_raw
  changed_when: false

- name: Set protected / md-member / LVM facts
  ansible.builtin.set_fact:
    _protected_disks: "{{ _protected_disks_raw.stdout_lines | default([]) | reject('equalto', '') | list }}"
    _md_member_disks: "{{ _md_members_raw.stdout_lines | default([]) | reject('equalto', '') | list }}"
    _lvm_pv_disks: "{{ _lvm_pvs_raw.stdout_lines | default([]) | reject('equalto', '') | list }}"

- name: Identify the disk hosting / (root filesystem)
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -uo pipefail
      export LC_ALL=C LANG=C
      root_src=$(findmnt -n -o SOURCE / 2>/dev/null || true)
      [ -z "$root_src" ] && exit 0
      lsblk -nrpso NAME,TYPE "$root_src" 2>/dev/null | \
          awk '$2 == "disk" {print $1; exit}' | xargs -n1 basename 2>/dev/null || true
  register: _root_disk_raw
  changed_when: false

- name: Set _detected_boot_device fact (back-compat with downstream filters)
  ansible.builtin.set_fact:
    _detected_boot_device: >-
      {{ (_root_disk_raw.stdout | default('') | trim)
         if (_root_disk_raw.stdout | default('') | trim) | length > 0
         else (_protected_disks[0] | default('')) }}

- name: Display disk classification
  ansible.builtin.debug:
    msg: |
      Disk classification (boot-drive safety):
        STRICT protected (boot / mounted FS / swap — NEVER touched):
        {% for d in _protected_disks %}  - /dev/{{ d }}
        {% else %}  (none — detection returned empty)
        {% endfor %}
        Existing md array members (will be ADOPTED, not recreated):
        {% for d in _md_member_disks %}  - /dev/{{ d }}
        {% else %}  (none)
        {% endfor %}
        LVM PV disks (informational):
        {% for d in _lvm_pv_disks %}  - /dev/{{ d }}
        {% else %}  (none)
        {% endfor %}
        Primary boot disk: {{ _detected_boot_device | default('UNKNOWN') }}

- name: FAIL if no protected disks were detected (refusing to risk the boot drive)
  ansible.builtin.fail:
    msg: |
      Boot / protected-disk detection returned an EMPTY list (no mounted FS,
      no swap). Refusing to proceed — running RAID / mkfs without an
      exclusion list could wipe the OS disk.

      Debug:
        /proc/mounts entries: {{ ansible_mounts | default([]) | length }}
        findmnt root: '{{ _root_disk_raw.stdout | default('') | trim }}'

      If you are intentionally provisioning a diskless / netboot system,
      set allow_empty_protected_disks: true in vars/main.yml (NOT recommended).
  when:
    - _protected_disks | length == 0
    - not (allow_empty_protected_disks | default(false) | bool)
