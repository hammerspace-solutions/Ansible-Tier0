---
# Detect ALL disks that host any active filesystem, mounted partition, swap,
# md member, or LVM PV. Returns a LIST of disk names (not just one) so we
# defend against:
#   - Multi-disk boot setups (separate /boot, /, /home)
#   - LVM/md spanning multiple disks
#   - Active swap on a non-root disk
#   - Hot-spares or leftover PVs from prior deployments
#
# Output facts:
#   _detected_boot_device  — string, primary boot disk (back-compat with old code)
#   _protected_disks       — list of all disk names that MUST NOT be touched
#
# Hard-fails if detection produces an empty list (instead of silently allowing
# mkfs on the boot drive — earlier prod incident: bare-metal Korean-locale host
# had detection silently return "" and the playbook proceeded to mkfs the
# boot NVMe; only saved by kernel reporting EBUSY).

- name: Detect all protected disks (boot, root, mounted, swap, md, LVM)
  ansible.builtin.shell:
    # Force bash: dash (Ubuntu /bin/sh) does not support `set -o pipefail`.
    executable: /bin/bash
    cmd: |
      set -uo pipefail
      export LC_ALL=C LANG=C

      resolve_to_disk() {
          local src="$1"
          [ -z "$src" ] && return
          [ -b "$src" ] || return

          # lsblk -s walks INVERSE dependencies (this device built on what?).
          # Continue up until we reach TYPE=disk, which is the physical disk.
          lsblk -nrpso NAME,TYPE "$src" 2>/dev/null | \
              awk '$2 == "disk" {print $1}' | \
              while read -r disk; do
                  basename "$disk"
              done
      }

      {
          # 1. Mounted filesystems
          awk '/^\/dev\// {print $1}' /proc/mounts | while read -r dev; do
              resolve_to_disk "$dev"
          done

          # 2. Active swap
          awk 'NR>1 && $1 ~ /^\/dev\// {print $1}' /proc/swaps | while read -r dev; do
              resolve_to_disk "$dev"
          done

          # 3. Active md array members
          if [ -r /proc/mdstat ]; then
              grep -oE '[a-z]+[0-9]+(n[0-9]+)?(p[0-9]+)?\[[0-9]+\]' /proc/mdstat 2>/dev/null | \
                  sed 's/\[[0-9]*\]$//' | \
                  while read -r member; do
                      resolve_to_disk "/dev/$member"
                  done
          fi

          # 4. LVM PVs (catches PVs from leftover/orphan VGs)
          pvs --noheadings -o pv_name 2>/dev/null | while read -r pv; do
              resolve_to_disk "$(echo "$pv" | xargs)"
          done
      } | sort -u | grep -v '^$' || true
  register: _protected_disks_raw
  changed_when: false

- name: Set _protected_disks fact
  ansible.builtin.set_fact:
    _protected_disks: "{{ _protected_disks_raw.stdout_lines | default([]) | reject('equalto', '') | list }}"

- name: Identify the disk hosting / (root filesystem)
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -uo pipefail
      export LC_ALL=C LANG=C
      root_src=$(findmnt -n -o SOURCE / 2>/dev/null || true)
      [ -z "$root_src" ] && exit 0
      lsblk -nrpso NAME,TYPE "$root_src" 2>/dev/null | \
          awk '$2 == "disk" {print $1; exit}' | xargs -n1 basename 2>/dev/null || true
  register: _root_disk_raw
  changed_when: false

- name: Set _detected_boot_device fact (back-compat with downstream filters)
  ansible.builtin.set_fact:
    _detected_boot_device: >-
      {{ (_root_disk_raw.stdout | default('') | trim)
         if (_root_disk_raw.stdout | default('') | trim) | length > 0
         else (_protected_disks[0] | default('')) }}

- name: Display protected disks
  ansible.builtin.debug:
    msg: |
      Protected disks (boot / root / mounted / swap / md / LVM — will NEVER be touched):
      {% for d in _protected_disks %}
        - /dev/{{ d }}
      {% else %}
        (none — detection returned empty)
      {% endfor %}
      Primary boot disk: {{ _detected_boot_device | default('UNKNOWN') }}

- name: FAIL if no protected disks were detected (refusing to risk the boot drive)
  ansible.builtin.fail:
    msg: |
      Boot / protected-disk detection returned an EMPTY list.
      Refusing to proceed — running RAID / mkfs without an exclusion list
      could wipe the OS disk.

      Debug:
        /proc/mounts entries: {{ ansible_mounts | default([]) | length }}
        findmnt root: '{{ _root_disk_raw.stdout | default('') | trim }}'

      If you are intentionally provisioning a diskless / netboot system,
      set allow_empty_protected_disks: true in vars/main.yml (NOT recommended).
  when:
    - _protected_disks | length == 0
    - not (allow_empty_protected_disks | default(false) | bool)
