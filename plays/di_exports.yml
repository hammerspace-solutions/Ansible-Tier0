---
# Auto-wire DI node IPs into Tier 0 NFS exports.
# Imported by site.yml — runs BEFORE the DI play so exports are ready when DI registers.
#
# When deploy_di is true and di_auto_export is true (default), this play
# collects DI node IPs from the di_nodes inventory group and ensures they
# have no_root_squash NFS access on all storage_servers. This eliminates
# the manual step of adding DI IPs to mover_nodes in vars/main.yml.

- name: Auto-configure NFS exports for DI nodes
  hosts: storage_servers
  become: true
  gather_facts: true

  vars_files:
    - ../vars/main.yml

  pre_tasks:
    # NOTE: plays/ are imported, so playbook_dir resolves to .../plays/ — not
    # the repo root. The "../" hop is required for the import_playbook layout.
    - name: Load vault variables (if available)
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/vault.yml"
      failed_when: false
      no_log: true

  tasks:
    - name: Skip if DI is not enabled or auto-export is disabled
      ansible.builtin.meta: end_play
      when: not (deploy_di | default(false) | bool) or not (di_auto_export | default(true) | bool)

    - name: Collect DI node IPs from inventory
      ansible.builtin.set_fact:
        _di_node_ips: >-
          {{ groups['di_nodes'] | default([])
             | map('extract', hostvars, 'di_node_ip')
             | select('defined')
             | list }}
        _di_node_ips_fallback: >-
          {{ groups['di_nodes'] | default([])
             | map('extract', hostvars, 'ansible_host')
             | select('defined')
             | list }}
      run_once: true

    - name: Merge DI IPs (prefer di_node_ip, fall back to ansible_host)
      ansible.builtin.set_fact:
        _di_ips_resolved: >-
          {{ _di_node_ips if (_di_node_ips | length > 0)
             else _di_node_ips_fallback }}
      run_once: true

    - name: Identify DI IPs not already in mover_nodes
      ansible.builtin.set_fact:
        _di_ips_new: "{{ _di_ips_resolved | difference(mover_nodes | default([])) }}"
      run_once: true

    - name: Skip if all DI IPs are already in mover_nodes
      ansible.builtin.debug:
        msg: "All DI node IPs are already in mover_nodes — no export changes needed."
      when: _di_ips_new | length == 0
      run_once: true

    - name: Add DI node IPs to NFS exports
      when: _di_ips_new | length > 0
      block:
        - name: Display new DI IPs being added to exports
          ansible.builtin.debug:
            msg: "Adding DI node IPs to NFS exports (no_root_squash): {{ _di_ips_new | join(', ') }}"
          run_once: true

        - name: Add DI IPs to /etc/exports
          ansible.builtin.lineinfile:
            path: /etc/exports
            regexp: "^{{ item.0 }}\\s.*{{ item.1 | regex_escape }}"
            line: "{{ item.0 }} {{ item.1 }}({{ hammerspace_export_opts | default('rw,no_root_squash,sync,secure,mp,no_subtree_check') }})"
            insertafter: "^{{ item.0 | regex_escape }}\\s"
            state: present
          loop: "{{ mount_points | default([]) | map(attribute='path') | product(_di_ips_new) | list }}"
          loop_control:
            label: "{{ item.0 }} -> {{ item.1 }}"
          notify: reload nfs exports
          when: mount_points is defined

  handlers:
    - name: reload nfs exports
      ansible.builtin.command:
        cmd: exportfs -ra
      changed_when: true

  tags: [di, di-exports]
