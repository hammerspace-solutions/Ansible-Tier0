---
# Serialized Hammerspace Integration (Option A: serial play).
# Imported by site.yml.
#
# When hammerspace_serial > 0, this play processes N nodes at a time for
# Hammerspace API integration. Prevents overwhelming Anvil with concurrent
# node registrations and volume adds (e.g., 10+ nodes x 4 volumes).
#
# Usage:
#   vars/main.yml:   hammerspace_serial: 2    (process 2 nodes at a time)
#   command line:    -e hammerspace_serial=2
#
# When hammerspace_serial is 0 (default), this play is skipped and integration
# runs inline in plays/storage.yml (all hosts in parallel, original behavior).

- name: Hammerspace Integration (serialized)
  hosts: storage_servers
  become: true
  gather_facts: false
  serial: "{{ hammerspace_serial | default(0) }}"

  vars_files:
    - ../vars/main.yml

  pre_tasks:
    # NOTE: plays/ are imported, so playbook_dir resolves to .../plays/ — not
    # the repo root. The "../" hop is required for the import_playbook layout.
    - name: Load vault variables (if available)
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/vault.yml"
      failed_when: false
      no_log: true

  roles:
    - role: hammerspace_integration
      when:
        - hammerspace_api_host is defined
        - (hammerspace_serial | default(0) | int) > 0
      tags: [hammerspace, integration]
